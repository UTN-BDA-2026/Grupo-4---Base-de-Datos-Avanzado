<h1>Mis Playlists</h1>

<a href="/playlists/create/">
    Crear nueva playlist
</a>

<hr>

{% for playlist in playlists %}

    <div>

        <h3>{{ playlist.name }}</h3>

        <p>{{ playlist.description }}</p>

        <small>
            Creada:
            {{ playlist.created_at }}
        </small>

    </div>

    <hr>

{% empty %}

    <p>No tienes playlists.</p>

{% endfor %}
