<h1>Crear Playlist</h1>

<form method="POST">

    {% csrf_token %}

    <input
        type="text"
        name="name"
        placeholder="Nombre playlist"
    >

    <br><br>

    <textarea
        name="description"
        placeholder="Descripción"
    ></textarea>

    <br><br>

    <button type="submit">
        Crear
    </button>

</form>
